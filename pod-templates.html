            </div>

    </div>
</script>

<!-- Delivery Completion Modal -->

                </button>
                <button type="submit" class="btn btn-success" data-testid="button-complete">
                    <i class="fas fa-check mr-2"></i>
                    Complete Delivery
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Styles for POD -->
<style>
.input-field {
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    background-color: #fff;
}

.input-field:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 1.5rem;
    border-radius: 0.5rem;
    font-weight: 600;
    transition: all 0.2s ease-in-out;
    box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
    border: 1px solid transparent;
    cursor: pointer;
    text-decoration: none;
}

.btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
}

.btn-primary { background-color: #2563eb; color: white; }
.btn-primary:hover { background-color: #1d4ed8; }

.btn-secondary { background-color: #e5e7eb; color: #1f2937; border-color: #d1d5db; }
.btn-secondary:hover { background-color: #d1d5db; }

.btn-success { background-color: #10b981; color: white; }
.btn-success:hover { background-color: #059669; }

.btn-danger { background-color: #ef4444; color: white; }
.btn-danger:hover { background-color: #dc2626; }

.overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6); display: flex;
    align-items: center; justify-content: center; z-index: 1000;
    opacity: 0; visibility: hidden; transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
    padding: 1rem;
}

.overlay.visible {
    opacity: 1; visibility: visible;
}

.modal-content {
    background: white; padding: 1.5rem; border-radius: 0.75rem;
    width: 100%; max-width: 600px;
    max-height: 90vh; overflow-y: auto;
    transform: scale(0.95); transition: transform 0.3s ease-in-out;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
}

.overlay.visible .modal-content {
    transform: scale(1);
}

.suggestions-container {
    position: absolute;
    width: 100%;
    background-color: white;
    border: 1px solid #d1d5db;
    border-top: none;
    border-radius: 0 0 0.5rem 0.5rem;
    max-height: 200px;
    overflow-y: auto;
    z-index: 50;
}

.suggestion-item {
    padding: 0.75rem;
    cursor: pointer;
}

.suggestion-item:hover {
    background-color: #f3f4f6;
}

.signature-pad-canvas {
    border: 2px dashed #d1d5db;
    border-radius: 0.5rem;
}

.rating-stars {
    display: inline-flex;
    flex-direction: row-reverse;
    justify-content: center;
}

.rating-stars input[type="radio"] {
    display: none;
}

.rating-stars label {
    font-size: 2.5rem;
    color: #d1d5db;
    cursor: pointer;
    transition: color 0.2s;
}

.rating-stars input[type="radio"]:checked ~ label,
.rating-stars label:hover,
.rating-stars label:hover ~ label {
    color: #f59e0b;
}

.delivery-card {
    transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
}

.delivery-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px -4px rgba(0,0,0,0.1);
}

/* Loading animation */
.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
